<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="style.css">
    <title>Project 1 | SCSS</title>

<body>
    <div class="dashboard-grid">
        <div class="card dashboard-card status-primary">
            <h3>Statistika 1</h3>
            <p>Bu asosiy ma'lumotlar uchun karta.</p>
        </div>

        <div class="card dashboard-card status-success">
            <h3>Statistika 2</h3>
            <p>Muvaffaqiyatli bajarilgan vazifalar.</p>
        </div>

        <div class="card dashboard-card status-warning">
            <h3>Statistika 3</h3>
            <p>E'tibor talab qiladigan jarayonlar.</p>
        </div>

        <div class="card dashboard-card status-danger">
            <h3>Statistika 4</h3>
            <p>Xatoliklar yoki kritik holatlar.</p>
        </div>

        <div class="card dashboard-card status-primary">
            <h3>Statistika 5</h3>
            <p>Yana qo'shimcha ma'lumot.</p>
        </div>

        <div class="card dashboard-card status-success">
            <h3>Statistika 6</h3>
            <p>Yakuniy hisobot.</p>
        </div>
    </div>
</body>

</html>
